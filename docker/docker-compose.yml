version: "3.8"

services:
  setara-node:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: setara-node
    ports:
      - "26656:26656"             # P2P (must be public for peering)
      - "127.0.0.1:26657:26657"   # RPC (localhost only)
      - "127.0.0.1:1317:1317"     # REST API (localhost only)
      - "127.0.0.1:9090:9090"     # gRPC (localhost only)
    volumes:
      - setara-data:/home/setara/.setara
      - ./scripts:/scripts:ro
      - ./genesis:/genesis:ro
    environment:
      - MONIKER=${MONIKER:-setara-node}
      - CHAIN_ID=${CHAIN_ID:-setara-testnet-1}
      - SEEDS=${SEEDS:-}
      - PERSISTENT_PEERS=${PERSISTENT_PEERS:-}
    entrypoint: ["/bin/bash", "/scripts/start.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:26657/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - setara

  setara-api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: setara-api
    ports:
      - "127.0.0.1:8888:8888"
    volumes:
      - api-data:/data
    environment:
      - API_PORT=8888
      - CHAIN_RPC=http://setara-node:26657
      - CHAIN_GRPC=setara-node:9090
      - CHAIN_ID=${CHAIN_ID:-setara-testnet-1}
      - DB_PATH=/data/setara-api.db
      - ADMIN_SECRET=${ADMIN_SECRET:?ADMIN_SECRET must be set}
    depends_on:
      setara-node:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/v1/verify?hash=healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - setara

  ipfs:
    image: ipfs/kubo:latest
    container_name: setara-ipfs
    ports:
      - "4001:4001"               # Swarm (must be public for IPFS)
      - "127.0.0.1:5001:5001"     # API (localhost only)
      - "127.0.0.1:8080:8080"     # Gateway (localhost only)
    volumes:
      - ipfs-data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - setara

volumes:
  setara-data:
  api-data:
  ipfs-data:

networks:
  setara:
    driver: bridge
