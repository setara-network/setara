syntax = "proto3";

package setara.document.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "setara/document/v1/document.proto";
import "setara/document/v1/params.proto";

option go_package = "setara/x/document/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/setara/document/v1/params";
  }

  // ListDocument Queries a list of Document items.
  rpc GetDocument(QueryGetDocumentRequest) returns (QueryGetDocumentResponse) {
    option (google.api.http).get = "/setara/document/v1/document/{index}";
  }

  // ListDocument defines the ListDocument RPC.
  rpc ListDocument(QueryAllDocumentRequest) returns (QueryAllDocumentResponse) {
    option (google.api.http).get = "/setara/document/v1/document";
  }

  // DocumentByHash Queries a list of DocumentByHash items.
  rpc DocumentByHash(QueryDocumentByHashRequest) returns (QueryDocumentByHashResponse) {
    option (google.api.http).get = "/setara/document/v1/document_by_hash/{hash}";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// QueryGetDocumentRequest defines the QueryGetDocumentRequest message.
message QueryGetDocumentRequest {
  string index = 1;
}

// QueryGetDocumentResponse defines the QueryGetDocumentResponse message.
message QueryGetDocumentResponse {
  Document document = 1 [(gogoproto.nullable) = false];
}

// QueryAllDocumentRequest defines the QueryAllDocumentRequest message.
message QueryAllDocumentRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryAllDocumentResponse defines the QueryAllDocumentResponse message.
message QueryAllDocumentResponse {
  repeated Document document = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryDocumentByHashRequest defines the QueryDocumentByHashRequest message.
message QueryDocumentByHashRequest {
  string hash = 1;
}

// QueryDocumentByHashResponse defines the QueryDocumentByHashResponse message.
message QueryDocumentByHashResponse {
  Document document = 1;
}
