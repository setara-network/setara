syntax = "proto3";

package setara.document.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "setara/document/v1/document.proto";
import "setara/document/v1/params.proto";

option go_package = "setara/x/document/types";

// GenesisState defines the document module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated Document document_map = 2 [(gogoproto.nullable) = false];
}
